name: Mock WB API Agent
on:
  schedule:
    - cron: '*/5 * * * *' # Запуск каждые 5 минут
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  run-mock-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Run Mock Generator
        run: python generate_mock.py
        
      - name: Commit and Push
        run: |
          git config user.name "Mock API Bot"
          git config user.email "bot@mock.api"
          git add orders.json
          git commit -m "Mock API: New orders generated"
          git push
