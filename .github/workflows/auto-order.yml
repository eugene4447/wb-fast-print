name: Mock WB Agent
on:
  schedule:
    - cron: '*/5 * * * *' # Запуск каждые 5 минут
  workflow_dispatch: # Можно запустить вручную кнопкой

jobs:
  update-orders:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Add Mock Order
        run: |
          # Скрипт, который добавляет новый заказ в файл
          echo '[{"id": '$(date +%s)', "article": "Товар от ИИ", "status": "Новый"}]' > orders.json
          git config user.name "AI Agent"
          git config user.email "ai@agent.com"
          git add orders.json
          git commit -m "New order generated by AI"
          git push
