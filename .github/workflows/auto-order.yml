name: Mock WB Agent
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-orders:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Add Mock Order
        run: |
          # Берем текущий список и добавляем в него новый заказ
          # Используем временный файл для обработки
          echo "$(jq '. + [{"id": '$(date +%s)', "article": "Товар от ИИ ('$(date +%H:%M)')", "status": "Новый"}]' orders.json)" > orders.json
          git config user.name "AI Agent"
          git config user.email "ai@agent.com"
          git add orders.json
          git commit -m "Update orders.json"
          git push
