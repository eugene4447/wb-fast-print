<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WB Sticker Generator</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Arial Black', Arial, sans-serif; }
        .no-print { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
        
        /* Стили стикера WB */
        .sticker { 
            width: 240px; height: 320px; border: 2px solid #000;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 5px; box-sizing: border-box;
            background: white; page-break-inside: avoid;
        }
        .wb-header { font-size: 48px; font-weight: 900; color: #ff007f; margin: 0; }
        .qr-area { display: flex; align-items: center; gap: 5px; }
        .side-bar { width: 12px; height: 180px; background: black; }
        .qr-img { width: 150px; height: 150px; }
        .sku-footer { font-size: 32px; font-weight: 900; margin-top: 5px; }
        
        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="no-print" onclick="window.print()">Печать стикеров</button>
    <div id="orders-container" class="grid"></div>

    <script>
        async function loadOrders() {
            const response = await fetch('orders.json');
            const orders = await response.json();
            const container = document.getElementById('orders-container');

            orders.reverse().forEach(order => {
                // Извлекаем только числовую часть артикула
                const skuNumber = order.sku.replace('WB-', '');
                
                container.innerHTML += `
                    <div class="sticker">
                        <div class="wb-header">WB</div>
                        <div class="qr-area">
                            <div class="side-bar"></div>
                            <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${order.sku}">
                            <div class="side-bar"></div>
                        </div>
                        <div class="sku-footer">${skuNumber}</div>
                    </div>
                `;
            });
        }
        loadOrders();
    </script>
</body>
</html>
