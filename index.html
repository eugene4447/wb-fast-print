<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WB Style Label</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        /* Дизайн стикера */
        .sticker { 
            width: 240px; height: 300px; border: 1px solid #000;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 10px; box-sizing: border-box;
        }
        .wb-logo { font-size: 40px; font-weight: 900; color: #ff007f; margin: 5px 0; }
        .qr-main { width: 160px; height: 160px; }
        .sku-text { font-size: 28px; font-weight: bold; margin: 5px 0; }
        .side-bars { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; }
        .bar { width: 10px; height: 180px; background: black; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <button class="no-print" onclick="window.print()">Печать всех стикеров</button>
    <div id="orders-container" class="grid"></div>

    <script>
        async function loadOrders() {
            const response = await fetch('orders.json');
            const orders = await response.json();
            const container = document.getElementById('orders-container');

            orders.forEach(order => {
                // Берем последние 7 цифр из SKU для примера
                const skuCode = order.sku.replace('WB-', '');
                
                container.innerHTML += `
                    <div class="sticker">
                        <div class="wb-logo">WB</div>
                        <div class="side-bars">
                            <div class="bar"></div>
                            <img class="qr-main" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${order.sku}">
                            <div class="bar"></div>
                        </div>
                        <div class="sku-text">${skuCode}</div>
                    </div>
                `;
            });
        }
        loadOrders();
    </script>
</body>
</html>
