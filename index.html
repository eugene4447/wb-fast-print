<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказы Wildberries</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background-color: #f4f4f9; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 10px; border-radius: 8px; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        @media print { .no-print { display: none; } body { background: white; padding: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Список заказов WB</h1>
        <button class="no-print" onclick="window.print()">Печать всех заказов</button>
    </div>
    <div id="orders">Загрузка данных...</div>

    <script>
        // Функция загрузки заказов из JSON
        async function loadOrders() {
            try {
                const response = await fetch('orders.json');
                const orders = await response.json();
                const container = document.getElementById('orders');
                container.innerHTML = '';
                orders.forEach(order => {
                    container.innerHTML += `
                        <div class="card">
                            <strong>Артикул:</strong> ${order.article} <br> 
                            <small>Статус: ${order.status}</small>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('orders').innerText = "Ошибка загрузки заказов.";
            }
        }
        loadOrders();
    </script>
</body>
</html>
